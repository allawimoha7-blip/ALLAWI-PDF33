<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ALLAWI PDF Reader — Read PDFs Faster, Smarter, Better.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ALLAWI PDF Reader">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <meta name="theme-color" content="#2F6FED">

  <title>ALLAWI PDF Reader</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Lightweight inline loading splash shown before Flutter engine
       attaches — avoids a blank white flash on slow connections.
       Removed automatically once Flutter's first frame is rendered. -->
  <style>
    html, body { margin: 0; height: 100%; background: #0E1116; }
    #boot-splash {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; background: #0E1116;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: white; z-index: 9999;
    }
    #boot-splash .mark {
      width: 64px; height: 64px; border-radius: 16px;
      background: rgba(47,111,237,0.18); display: flex; align-items: center;
      justify-content: center; margin-bottom: 16px;
    }
    #boot-splash .mark div {
      width: 32px; height: 40px; background: #2F6FED; border-radius: 4px;
    }
    #boot-splash p { font-size: 14px; opacity: 0.7; margin-top: 4px; }
  </style>
  <div id="boot-splash">
    <div class="mark"><div></div></div>
    <strong>ALLAWI PDF Reader</strong>
    <p>Read PDFs Faster, Smarter, Better.</p>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('boot-splash');
      if (el) el.remove();
    });
  </script>
</body>
</html>
